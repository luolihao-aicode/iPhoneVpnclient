name: Build iOS (sideload)

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  workflow_dispatch:

env:
  SING_BOX_VERSION: v1.10.0
  SING_BOX_REPO: sagernet/sing-box
  GO_VERSION: '1.23'

jobs:
  build-libbox-framework:
    runs-on: macos-latest
    outputs:
      framework-path: ${{ steps.build-framework.outputs.framework-path }}

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install sing-box mobile build tools
        run: |
          go install github.com/sagernet/gomobile/cmd/gomobile@v0.1.4
          go install github.com/sagernet/gomobile/cmd/gobind@v0.1.4
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
          gomobile init

      - name: Checkout sing-box source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SING_BOX_REPO }}
          ref: ${{ env.SING_BOX_VERSION }}
          path: sing-box-source

      - name: Build libbox iOS framework
        id: build-framework
        run: |
          cd sing-box-source
          go run ./cmd/internal/build_libbox -target ios
          mv Libbox.xcframework ${{ github.workspace }}/ios/Runner/Libbox.xcframework

      - name: Upload framework artifact
        uses: actions/upload-artifact@v4
        with:
          name: Libbox.xcframework
          path: ios/Runner/Libbox.xcframework
          retention-days: 1

  build-ios:
    needs: build-libbox-framework
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download libbox framework
        uses: actions/download-artifact@v4
        with:
          name: Libbox.xcframework
          path: ios/Runner/Libbox.xcframework

      - name: Verify framework downloaded
        run: |
          FRAMEWORK_SIZE=$(du -sk ios/Runner/Libbox.xcframework 2>/dev/null | cut -f1)
          echo "Libbox.xcframework size: ${FRAMEWORK_SIZE}KB"
          if [ -z "$FRAMEWORK_SIZE" ] || [ "$FRAMEWORK_SIZE" -lt 5000 ]; then
            echo "ERROR: Libbox.xcframework is missing or too small"
            exit 1
          fi
          echo "OK: Libbox.xcframework looks valid"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Precache iOS
        run: flutter precache --ios

      - name: Pod install
        run: |
          cd ios
          pod install

      - name: Build iOS .app for sideload
        id: build-app
        run: |
          # DEVELOPMENT_TEAM and CODE_SIGN_STYLE are baked into the Xcode
          # project. --no-codesign keeps the output unsigned so tools like
          # i4/3uTools can attempt a local resign with a free Apple ID.
          flutter build ios --release --no-codesign 2>&1

          APP_PATH="build/ios/Release-iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH=$(find build -name "Runner.app" -type d 2>/dev/null | head -1)
          fi

          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: Runner.app not found"
            exit 1
          fi

          APP_SIZE=$(du -sk "$APP_PATH" | cut -f1)
          echo "Runner.app: $APP_PATH (${APP_SIZE}KB)"
          echo "app-path=$APP_PATH" >> "$GITHUB_OUTPUT"

          if [ "$APP_SIZE" -lt 1000 ]; then
            echo "ERROR: Runner.app too small (${APP_SIZE}KB)"
            exit 1
          fi
          echo "OK: Runner.app looks valid (${APP_SIZE}KB)"

      - name: Build and embed Packet Tunnel extension
        run: |
          APP_PATH="${{ steps.build-app.outputs.app-path }}"

          rm -rf build/ios-extension
          xcodebuild \
            -project ios/Runner.xcodeproj \
            -target ForgeVpnPacketTunnel \
            -configuration Release \
            -sdk iphoneos \
            CONFIGURATION_BUILD_DIR="${{ github.workspace }}/build/ios-extension/Release-iphoneos" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

          EXT_BUILT="${{ github.workspace }}/build/ios-extension/Release-iphoneos/ForgeVpnPacketTunnel.appex"
          if [ -z "$EXT_BUILT" ] || [ ! -d "$EXT_BUILT" ]; then
            echo "ERROR: built ForgeVpnPacketTunnel.appex not found"
            find build/ios-extension -name "*.appex" -print 2>/dev/null || true
            exit 1
          fi

          mkdir -p "$APP_PATH/PlugIns"
          rm -rf "$APP_PATH/PlugIns/ForgeVpnPacketTunnel.appex"
          cp -R "$EXT_BUILT" "$APP_PATH/PlugIns/"

          if [ ! -f "$APP_PATH/PlugIns/ForgeVpnPacketTunnel.appex/ForgeVpnPacketTunnel" ]; then
            echo "ERROR: embedded extension executable missing after copy"
            find "$APP_PATH/PlugIns/ForgeVpnPacketTunnel.appex" -maxdepth 2 -type f -print 2>/dev/null || true
            exit 1
          fi

          EXT_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$APP_PATH/PlugIns/ForgeVpnPacketTunnel.appex/Info.plist" 2>/dev/null || true)
          EXT_SHORT_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$APP_PATH/PlugIns/ForgeVpnPacketTunnel.appex/Info.plist" 2>/dev/null || true)
          if [ -z "$EXT_VERSION" ] || [ -z "$EXT_SHORT_VERSION" ]; then
            echo "ERROR: extension bundle version fields are missing"
            plutil -p "$APP_PATH/PlugIns/ForgeVpnPacketTunnel.appex/Info.plist" || true
            exit 1
          fi
          echo "Extension version: ${EXT_SHORT_VERSION} (${EXT_VERSION})"

          echo "OK: embedded built Packet Tunnel extension"

      - name: Inspect and package real VPN IPA
        run: |
          APP_PATH="${{ steps.build-app.outputs.app-path }}"
          INSPECTION_FILE="ios-build-inspection.txt"
          IPA_FILE="forge-vpn-ios-real-vpn.ipa"

          rm -rf Payload "$IPA_FILE" "$INSPECTION_FILE"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/

          EXT_PATH="Payload/Runner.app/PlugIns/ForgeVpnPacketTunnel.appex"
          EXT_EXECUTABLE="ForgeVpnPacketTunnel"
          EXT_EXECUTABLE_PATH="$EXT_PATH/$EXT_EXECUTABLE"

          {
            echo "=== Forge VPN iOS build inspection ==="
            echo "App path: $APP_PATH"
            echo "Payload path: Payload/Runner.app"
            echo ""

            echo "=== Payload bundle list ==="
            find Payload/Runner.app -maxdepth 4 \( -name "*.appex" -o -name "*.framework" -o -name "*.dylib" \) 2>/dev/null | sort
            echo ""

            echo "=== Main app Info.plist ==="
            echo "CFBundleIdentifier:"
            /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "Payload/Runner.app/Info.plist"
            echo "CFBundleExecutable:"
            /usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "Payload/Runner.app/Info.plist"
            echo "NEProviderClasses:"
            /usr/libexec/PlistBuddy -c "Print :NEProviderClasses" "Payload/Runner.app/Info.plist" 2>/dev/null || echo "(none)"
            echo ""

            echo "=== Main app Mach-O architecture ==="
            file "Payload/Runner.app/Runner"
            lipo -info "Payload/Runner.app/Runner" 2>/dev/null || true
            echo ""

            echo "=== Embedded frameworks ==="
            find Payload/Runner.app/Frameworks -maxdepth 2 -type f 2>/dev/null | sort || echo "(no Frameworks directory)"
            echo ""

            echo "=== Extension exists ==="
            test -d "$EXT_PATH"
            echo "Found: $EXT_PATH"
            echo ""

            echo "=== Extension Info.plist ==="
            echo "CFBundleIdentifier:"
            /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$EXT_PATH/Info.plist"
            echo "CFBundleExecutable:"
            /usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$EXT_PATH/Info.plist"
            echo "NSExtensionPointIdentifier:"
            /usr/libexec/PlistBuddy -c "Print :NSExtension:NSExtensionPointIdentifier" "$EXT_PATH/Info.plist"
            echo "NSExtensionPrincipalClass:"
            /usr/libexec/PlistBuddy -c "Print :NSExtension:NSExtensionPrincipalClass" "$EXT_PATH/Info.plist"
            echo ""

            echo "=== Extension executable ==="
            test -f "$EXT_EXECUTABLE_PATH"
            ls -la "$EXT_EXECUTABLE_PATH"
            file "$EXT_EXECUTABLE_PATH"
            lipo -info "$EXT_EXECUTABLE_PATH" 2>/dev/null || true
            echo ""

            echo "=== Extension bundle files ==="
            find "$EXT_PATH" -maxdepth 3 -type f | sort
            echo ""

            echo "=== Entitlements requested by project ==="
            echo "Runner.entitlements:"
            cat ios/Runner/Runner.entitlements
            echo ""
            echo "ForgeVpnPacketTunnel.entitlements:"
            cat ios/ForgeVpnPacketTunnel/ForgeVpnPacketTunnel.entitlements
            echo ""

            echo "=== codesign inspection (unsigned is expected for --no-codesign) ==="
            codesign -d --entitlements :- "Payload/Runner.app" 2>&1 || true
            codesign -d --entitlements :- "$EXT_PATH" 2>&1 || true
          } | tee "$INSPECTION_FILE"

          if [ ! -d "$EXT_PATH" ]; then
            echo "ERROR: ForgeVpnPacketTunnel.appex not found in Payload"
            ls -la Payload/Runner.app/PlugIns/ 2>/dev/null || true
            exit 1
          fi

          if [ ! -f "$EXT_EXECUTABLE_PATH" ]; then
            echo "ERROR: extension executable missing: $EXT_EXECUTABLE_PATH"
            exit 1
          fi

          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$EXT_PATH/Info.plist" >/dev/null
          /usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$EXT_PATH/Info.plist" >/dev/null
          /usr/libexec/PlistBuddy -c "Print :NSExtension:NSExtensionPointIdentifier" "$EXT_PATH/Info.plist" >/dev/null
          /usr/libexec/PlistBuddy -c "Print :NSExtension:NSExtensionPrincipalClass" "$EXT_PATH/Info.plist" >/dev/null

          ditto -c -k --sequesterRsrc --keepParent Payload "$IPA_FILE"

          IPA_SIZE=$(du -sk "$IPA_FILE" | cut -f1)
          echo "IPA file: $IPA_FILE (${IPA_SIZE}KB)"

          if [ "$IPA_SIZE" -lt 3000 ]; then
            echo "ERROR: IPA too small (${IPA_SIZE}KB < 3000KB)"
            exit 1
          fi

          echo "OK: real VPN IPA created"
          rm -rf Payload

      - name: Upload real VPN IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: forge-vpn-ios-real-vpn.ipa
          path: forge-vpn-ios-real-vpn.ipa
          retention-days: 7

      - name: Upload iOS build inspection
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-inspection.txt
          path: ios-build-inspection.txt
          retention-days: 7
