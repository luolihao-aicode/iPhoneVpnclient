name: Build iOS (sideload)

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  workflow_dispatch:

env:
  SING_BOX_VERSION: v1.10.0
  SING_BOX_REPO: sagernet/sing-box
  GO_VERSION: '1.23'

jobs:
  build-singbox-framework:
    runs-on: macos-latest
    outputs:
      framework-path: ${{ steps.build-framework.outputs.framework-path }}

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
          gomobile init

      - name: Checkout sing-box source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SING_BOX_REPO }}
          ref: ${{ env.SING_BOX_VERSION }}
          path: sing-box-source

      - name: Patch gomobile bindings into sing-box
        run: |
          mkdir -p sing-box-source/golib/ios
          cp golib/ios/*.go golib/ios/go.mod sing-box-source/golib/ios/
          cd sing-box-source/golib/ios
          echo "replace github.com/sagernet/sing-box => ../.." >> go.mod

      - name: Build sing-box iOS framework
        id: build-framework
        run: |
          cd sing-box-source/golib/ios
          go get golang.org/x/mobile@latest
          go mod tidy
          gomobile bind -v \
            -target=ios \
            -iosversion=14.0 \
            -ldflags='-s -w' \
            -o ${{ github.workspace }}/ios/Runner/Singbox.xcframework \
            .

      - name: Upload framework artifact
        uses: actions/upload-artifact@v4
        with:
          name: Singbox.xcframework
          path: ios/Runner/Singbox.xcframework
          retention-days: 1

  build-ios:
    needs: build-singbox-framework
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download sing-box framework
        uses: actions/download-artifact@v4
        with:
          name: Singbox.xcframework
          path: ios/Runner/Singbox.xcframework

      - name: Verify framework downloaded
        run: |
          FRAMEWORK_SIZE=$(du -sk ios/Runner/Singbox.xcframework 2>/dev/null | cut -f1)
          echo "Singbox.xcframework size: ${FRAMEWORK_SIZE}KB"
          if [ -z "$FRAMEWORK_SIZE" ] || [ "$FRAMEWORK_SIZE" -lt 5000 ]; then
            echo "❌ Singbox.xcframework is missing or too small"
            exit 1
          fi
          echo "✅ Singbox.xcframework looks valid"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Precache iOS
        run: flutter precache --ios

      - name: Pod install
        run: |
          cd ios
          pod install

      - name: Build iOS .app for sideload
        id: build-app
        run: |
          # DEVELOPMENT_TEAM and CODE_SIGN_STYLE are baked into the Xcode
          # project (Manual + empty team). --no-codesign tells xcodebuild
          # to skip actual code signing. The build should succeed cleanly.
          flutter build ios --release --no-codesign 2>&1

          # Locate the compiled .app and validate its size
          APP_PATH="build/ios/Release-iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH=$(find build -name "Runner.app" -type d 2>/dev/null | head -1)
          fi

          if [ ! -d "$APP_PATH" ]; then
            echo "❌ Runner.app not found"
            exit 1
          fi

          APP_SIZE=$(du -sk "$APP_PATH" | cut -f1)
          echo "Runner.app: $APP_PATH (${APP_SIZE}KB)"
          echo "app-path=$APP_PATH" >> "$GITHUB_OUTPUT"

          if [ "$APP_SIZE" -lt 1000 ]; then
            echo "❌ Runner.app too small (${APP_SIZE}KB), build failed"
            exit 1
          fi
          echo "✅ Runner.app looks valid (${APP_SIZE}KB)"

      - name: Verify extension embedded in .app
        run: |
          APP_PATH="${{ steps.build-app.outputs.app-path }}"
          echo ""
          echo "═══════════════════════════════════════════════"
          echo "  EXTENSION VERIFICATION"
          echo "═══════════════════════════════════════════════"
          echo ""

          # 1. List all bundles
          echo "=== .app bundle contents ==="
          find "$APP_PATH" -maxdepth 3 -name "*.appex" -o -name "*.framework" 2>/dev/null | sort
          echo ""

          # 2. Check PlugIns directory
          echo "=== PlugIns directory ==="
          if [ -d "$APP_PATH/PlugIns/" ]; then
            EXTS=$(ls "$APP_PATH/PlugIns/")
            echo "$EXTS"
            echo ""

            # 3. Extension Info.plist
            EXT_PATH="$APP_PATH/PlugIns/ForgeVpnPacketTunnel.appex"
            if [ -d "$EXT_PATH" ]; then
              echo "=== Extension Info.plist (key fields) ==="
              plutil -p "$EXT_PATH/Info.plist" 2>/dev/null | head -30 || echo "(plutil failed)"
              echo ""

              echo "=== Extension Bundle ID ==="
              /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$EXT_PATH/Info.plist" 2>/dev/null || echo "(unknown)"
              echo ""

              echo "=== Extension Principal Class ==="
              /usr/libexec/PlistBuddy -c "Print :NSExtension:NSExtensionPrincipalClass" "$EXT_PATH/Info.plist" 2>/dev/null || echo "(unknown)"
              echo ""

              echo "=== Extension Point Identifier ==="
              /usr/libexec/PlistBuddy -c "Print :NSExtension:NSExtensionPointIdentifier" "$EXT_PATH/Info.plist" 2>/dev/null || echo "(unknown)"
              echo ""

              # 4. Entitlements
              echo "=== Extension Entitlements ==="
              codesign -d --entitlements - "$EXT_PATH" 2>&1 || echo "(unsigned - this is expected with --no-codesign)"
              echo ""
            else
              echo "⚠️  ForgeVpnPacketTunnel.appex NOT FOUND in PlugIns!"
              echo ""
            fi
          else
            echo "⚠️  PlugIns directory does not exist!"
            echo "    The extension was NOT embedded in the .app bundle."
          fi

          # 5. Main app entitlements
          echo "=== Main App Entitlements (codesign check) ==="
          codesign -d --entitlements - "$APP_PATH" 2>&1 || echo "(unsigned - expected with --no-codesign)"
          echo ""
          echo "═══════════════════════════════════════════════"
          echo "  VERIFICATION COMPLETE"
          echo "═══════════════════════════════════════════════"

      - name: Create .ipa for sideloading
        run: |
          APP_PATH="${{ steps.build-app.outputs.app-path }}"
          echo "Packaging: $APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r forge-vpn-ios.ipa Payload/

          IPA_SIZE=$(du -sk forge-vpn-ios.ipa | cut -f1)
          echo "forge-vpn-ios.ipa size: ${IPA_SIZE}KB"

          if [ "$IPA_SIZE" -lt 3000 ]; then
            echo "❌ IPA too small (${IPA_SIZE}KB < 3000KB), build failed"
            exit 1
          fi
          echo "✅ forge-vpn-ios.ipa created (${IPA_SIZE}KB)"

      - name: Final verification (from .ipa Payload)
        run: |
          echo ""
          echo "═══════════════════════════════════════════════"
          echo "  IPA PAYLOAD VERIFICATION"
          echo "═══════════════════════════════════════════════"
          echo ""

          EXT_PATH="Payload/Runner.app/PlugIns/ForgeVpnPacketTunnel.appex"

          echo "=== Extension exists? ==="
          if [ -d "$EXT_PATH" ]; then
            echo "✅ ForgeVpnPacketTunnel.appex found in Payload"
            echo ""

            echo "=== Key fields from extension Info.plist ==="
            echo "  CFBundleIdentifier:"
            /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$EXT_PATH/Info.plist" 2>/dev/null || echo "    (unknown)"
            echo "  CFBundleExecutable:"
            /usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$EXT_PATH/Info.plist" 2>/dev/null || echo "    (unknown)"
            echo "  NSExtensionPointIdentifier:"
            /usr/libexec/PlistBuddy -c "Print :NSExtension:NSExtensionPointIdentifier" "$EXT_PATH/Info.plist" 2>/dev/null || echo "    (unknown)"
            echo "  NSExtensionPrincipalClass:"
            /usr/libexec/PlistBuddy -c "Print :NSExtension:NSExtensionPrincipalClass" "$EXT_PATH/Info.plist" 2>/dev/null || echo "    (unknown)"
            echo ""

            echo "=== Extension Entitlements ==="
            codesign -d --entitlements :- "$EXT_PATH" 2>&1 || echo "    (unsigned - expected)"
            echo ""

            echo "=== Extension .appex size ==="
            du -sk "$EXT_PATH"
            echo ""

            echo "=== All extension files ==="
            find "$EXT_PATH" -type f | head -10
          else
            echo "❌ ForgeVpnPacketTunnel.appex NOT FOUND in Payload!"
            ls -la Payload/Runner.app/PlugIns/ 2>/dev/null || echo "    (PlugIns/ dir missing)"
          fi
          echo ""

          echo "=== Main App Info.plist: Bundle ID ==="
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "Payload/Runner.app/Info.plist" 2>/dev/null || echo "    (unknown)"
          echo ""
          echo "=== Main App NEProviderClasses ==="
          /usr/libexec/PlistBuddy -c "Print :NEProviderClasses" "Payload/Runner.app/Info.plist" 2>/dev/null || echo "    (none)"
          echo ""

          rm -rf Payload
          echo "═══════════════════════════════════════════════"
          echo "  IPA VERIFICATION COMPLETE"
          echo "═══════════════════════════════════════════════"

