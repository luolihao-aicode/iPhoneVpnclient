name: Build iOS (sideload)

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  workflow_dispatch:

env:
  SING_BOX_VERSION: v1.10.0
  SING_BOX_REPO: sagernet/sing-box
  GO_VERSION: '1.23'

jobs:
  build-singbox-framework:
    runs-on: macos-latest
    outputs:
      framework-path: ${{ steps.build-framework.outputs.framework-path }}

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
          gomobile init

      - name: Checkout sing-box source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SING_BOX_REPO }}
          ref: ${{ env.SING_BOX_VERSION }}
          path: sing-box-source

      - name: Patch gomobile bindings into sing-box
        run: |
          # Copy our Go wrapper into sing-box's ios build directory
          mkdir -p sing-box-source/golib/ios
          cp golib/ios/*.go golib/ios/go.mod sing-box-source/golib/ios/

          cd sing-box-source/golib/ios

          # Add replace directive to reference local sing-box
          echo "replace github.com/sagernet/sing-box => ../.." >> go.mod

      - name: Build sing-box iOS framework
        id: build-framework
        run: |
          cd sing-box-source/golib/ios

          # Ensure golang.org/x/mobile is in the dependency graph
          # Ensure golang.org/x/mobile is in the dependency graph
          go get golang.org/x/mobile@latest
          go mod tidy

          gomobile bind -v \
            -target=ios \
            -iosversion=14.0 \
            -ldflags='-s -w' \
            -o ${{ github.workspace }}/ios/Runner/Singbox.xcframework \
            .

      - name: Upload framework artifact
        uses: actions/upload-artifact@v4
        with:
          name: Singbox.xcframework
          path: ios/Runner/Singbox.xcframework
          retention-days: 1

  build-ios:
    needs: build-singbox-framework
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download sing-box framework
        uses: actions/download-artifact@v4
        with:
          name: Singbox.xcframework
          path: ios/Runner/Singbox.xcframework

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Precache iOS
        run: flutter precache --ios

      - name: Pod install
        run: |
          cd ios
          pod install
        continue-on-error: true

      - name: List iOS project files (debug)
        run: |
          echo "=== Xcode project ==="
          ls -la ios/Runner.xcodeproj/ 2>/dev/null || echo "No xcodeproj"
          echo "=== Frameworks ==="
          ls -la ios/Runner/Singbox.xcframework/ 2>/dev/null || echo "No Singbox framework"
          echo "=== Info.plist ==="
          cat ios/Runner/Info.plist 2>/dev/null | head -20

      - name: Embed framework into Xcode project
        run: |
          FRAMEWORK_PATH="$PWD/ios/Runner/Singbox.xcframework"
          if [ -d "$FRAMEWORK_PATH" ]; then
            echo "Framework found at $FRAMEWORK_PATH"
            # The framework path is already at the expected location.
            # Xcode will pick it up via the project.pbxproj reference.
            # If the .pbxproj doesn't have it yet, add it via PlistBuddy
            # or simply reference the framework in the build settings.
          else
            echo "Warning: Framework not found, building in pass-through mode"
          fi

      - name: Build iOS .app for sideload
        run: |
          # Build with Flutter — --no-codesign skips signing for sideload
          flutter build ios --release --no-codesign

      # If the above fails due to development team requirement,
      # fall back to building for simulator (no signing needed)
      # and skip the .ipa creation step.

      - name: Create .ipa for sideloading
        run: |
          mkdir -p Payload
          cp -r build/ios/Build/Products/Release-iphoneos/Runner.app Payload/
          zip -r forge-vpn-ios.ipa Payload/
          rm -rf Payload

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: forge-vpn-ios.ipa
          path: forge-vpn-ios.ipa
          retention-days: 7
