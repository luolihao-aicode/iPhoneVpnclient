name: Build iOS (sideload)

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  workflow_dispatch:

env:
  # Keep the iOS core aligned with Android so new protocols (including AnyTLS)
  # use the same libbox implementation on both platforms.
  SING_BOX_VERSION: v1.13.14
  SING_BOX_REPO: sagernet/sing-box
  GO_VERSION: '1.23'

jobs:
  build-libbox-framework:
    runs-on: macos-latest
    outputs:
      framework-path: ${{ steps.build-framework.outputs.framework-path }}

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install sing-box mobile build tools
        run: |
          go install github.com/sagernet/gomobile/cmd/gomobile@v0.1.12
          go install github.com/sagernet/gomobile/cmd/gobind@v0.1.12
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
          gomobile init

      - name: Checkout sing-box source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SING_BOX_REPO }}
          ref: ${{ env.SING_BOX_VERSION }}
          path: sing-box-source

      - name: Build libbox iOS framework
        id: build-framework
        run: |
          cd sing-box-source
          # sing-box v1.13+ accepts the Apple family target, with the concrete
          # iOS slice passed separately. The legacy `-target ios` is ignored
          # by its build entrypoint and leaves no Libbox.xcframework to package.
          go run ./cmd/internal/build_libbox -target apple -platform ios

          # Keep the generated Objective-C contract visible in the build log.
          # libbox's Go API and its gomobile Swift names differ across releases;
          # this makes future upgrades diagnosable without guessing selectors.
          echo "=== Generated Libbox Objective-C API ==="
          find Libbox.xcframework -name 'Libbox.h' -type f -print -exec sed -n '1,260p' {} \;

          # gomobile v0.1.4 emits a macOS-style Versions/A framework layout
          # for every slice when binding multiple Apple platforms together.
          # Xcode requires shallow bundles for iOS device and simulator slices.
          for framework in Libbox.xcframework/ios-*/Libbox.framework; do
            if [ -d "$framework/Versions/A" ]; then
              shallow_framework="${framework}.shallow"
              rm -rf "$shallow_framework"
              ditto "$framework/Versions/A" "$shallow_framework"
              rm -rf "$framework"
              mv "$shallow_framework" "$framework"
            fi
            if [ -f "$framework/Resources/Info.plist" ]; then
              cp "$framework/Resources/Info.plist" "$framework/Info.plist"
              framework_platform="iPhoneOS"
              if [[ "$framework" == *"simulator"* ]]; then
                framework_platform="iPhoneSimulator"
              fi
              /usr/libexec/PlistBuddy -c "Add :CFBundleDevelopmentRegion string en" "$framework/Info.plist"
              /usr/libexec/PlistBuddy -c "Add :CFBundleExecutable string Libbox" "$framework/Info.plist"
              /usr/libexec/PlistBuddy -c "Add :CFBundleIdentifier string io.nekohasekai.libbox" "$framework/Info.plist"
              /usr/libexec/PlistBuddy -c "Add :CFBundleInfoDictionaryVersion string 6.0" "$framework/Info.plist"
              /usr/libexec/PlistBuddy -c "Add :CFBundleName string Libbox" "$framework/Info.plist"
              /usr/libexec/PlistBuddy -c "Add :CFBundlePackageType string FMWK" "$framework/Info.plist"
              /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string 1.13.14" "$framework/Info.plist"
              /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string 1" "$framework/Info.plist"
              /usr/libexec/PlistBuddy -c "Add :CFBundleSupportedPlatforms array" "$framework/Info.plist"
              /usr/libexec/PlistBuddy -c "Add :CFBundleSupportedPlatforms:0 string $framework_platform" "$framework/Info.plist"
              /usr/libexec/PlistBuddy -c "Add :MinimumOSVersion string 15.0" "$framework/Info.plist"
              cp "$framework/Info.plist" "$framework/Resources/Info.plist"
            fi
          done

          mv Libbox.xcframework ${{ github.workspace }}/ios/Runner/Libbox.xcframework

      - name: Upload framework artifact
        uses: actions/upload-artifact@v4
        with:
          name: Libbox.xcframework
          path: ios/Runner/Libbox.xcframework
          retention-days: 1

  build-ios:
    needs: build-libbox-framework
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download libbox framework
        uses: actions/download-artifact@v4
        with:
          name: Libbox.xcframework
          path: ios/Runner/Libbox.xcframework

      - name: Verify framework downloaded
        run: |
          FRAMEWORK_SIZE=$(du -sk ios/Runner/Libbox.xcframework 2>/dev/null | cut -f1)
          echo "Libbox.xcframework size: ${FRAMEWORK_SIZE}KB"
          if [ -z "$FRAMEWORK_SIZE" ] || [ "$FRAMEWORK_SIZE" -lt 5000 ]; then
            echo "ERROR: Libbox.xcframework is missing or too small"
            exit 1
          fi
          echo "OK: Libbox.xcframework looks valid"

      - name: Install Apple signing assets
        env:
          IOS_SIGNING_CERTIFICATE_BASE64: ${{ secrets.IOS_SIGNING_CERTIFICATE_BASE64 }}
          IOS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.IOS_SIGNING_CERTIFICATE_PASSWORD }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
          IOS_PROFILE_APP_BASE64: ${{ secrets.IOS_PROFILE_APP_BASE64 }}
          IOS_PROFILE_TUNNEL_BASE64: ${{ secrets.IOS_PROFILE_TUNNEL_BASE64 }}
        run: |
          set -euo pipefail

          CERTIFICATE_PATH="$RUNNER_TEMP/forge-vpn-distribution.p12"
          APP_PROFILE_PATH="$RUNNER_TEMP/forge-vpn-app.mobileprovision"
          TUNNEL_PROFILE_PATH="$RUNNER_TEMP/forge-vpn-tunnel.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/forge-vpn-signing.keychain-db"
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"

          echo "$IOS_SIGNING_CERTIFICATE_BASE64" | base64 -D > "$CERTIFICATE_PATH"
          echo "$IOS_PROFILE_APP_BASE64" | base64 -D > "$APP_PROFILE_PATH"
          echo "$IOS_PROFILE_TUNNEL_BASE64" | base64 -D > "$TUNNEL_PROFILE_PATH"

          security create-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$IOS_SIGNING_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p "$PROFILE_DIR"
          APP_PROFILE_UUID=$(security cms -D -i "$APP_PROFILE_PATH" | plutil -extract UUID raw -)
          TUNNEL_PROFILE_UUID=$(security cms -D -i "$TUNNEL_PROFILE_PATH" | plutil -extract UUID raw -)
          APP_ENTITLEMENTS_PATH="$RUNNER_TEMP/forge-vpn-app.entitlements"
          cp "$APP_PROFILE_PATH" "$PROFILE_DIR/$APP_PROFILE_UUID.mobileprovision"
          cp "$TUNNEL_PROFILE_PATH" "$PROFILE_DIR/$TUNNEL_PROFILE_UUID.mobileprovision"

          # codesign does not synthesize application-identifier or team entitlements.
          # Extract the complete entitlement set authorized by the Ad Hoc profile so
          # iOS can validate the manually signed Runner.app on a physical device.
          security cms -D -i "$APP_PROFILE_PATH" | plutil -extract Entitlements xml1 -o "$APP_ENTITLEMENTS_PATH" -
          plutil -extract application-identifier raw "$APP_ENTITLEMENTS_PATH" >/dev/null

          if ! /usr/libexec/PlistBuddy -c 'Print :com.apple.developer.networking.vpn.api' "$APP_ENTITLEMENTS_PATH" 2>/dev/null | grep -q 'allow-vpn'; then
            echo "ERROR: Main app profile is missing the Personal VPN entitlement"
            echo "Recreate the Ad Hoc profile for com.luolihao.forgevpn after enabling Personal VPN, then update IOS_PROFILE_APP_BASE64."
            exit 1
          fi

          if ! /usr/libexec/PlistBuddy -c 'Print :com.apple.developer.networking.networkextension' "$APP_ENTITLEMENTS_PATH" 2>/dev/null | grep -q 'packet-tunnel-provider'; then
            echo "ERROR: Main app profile is missing the Packet Tunnel Network Extension entitlement"
            echo "Recreate the Ad Hoc profile for com.luolihao.forgevpn after enabling Network Extensions, then update IOS_PROFILE_APP_BASE64."
            exit 1
          fi

          IDENTITY=$(security find-identity -v -p codesigning | awk -F '"' '/Apple Distribution/ { print $2; exit }')
          if [ -z "$IDENTITY" ]; then
            echo "ERROR: Apple Distribution signing identity was not imported"
            security find-identity -v -p codesigning
            exit 1
          fi

          echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "APP_PROFILE_PATH=$APP_PROFILE_PATH" >> "$GITHUB_ENV"
          echo "APP_PROFILE_UUID=$APP_PROFILE_UUID" >> "$GITHUB_ENV"
          echo "APP_ENTITLEMENTS_PATH=$APP_ENTITLEMENTS_PATH" >> "$GITHUB_ENV"
          echo "TUNNEL_PROFILE_UUID=$TUNNEL_PROFILE_UUID" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Precache iOS
        run: flutter precache --ios

      - name: Pod install
        run: |
          cd ios
          pod install

      - name: Build unsigned iOS main app
        id: build-app
        run: |
          flutter build ios --release --no-codesign 2>&1

          APP_PATH="build/ios/Release-iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH=$(find build -name "Runner.app" -type d 2>/dev/null | head -1)
          fi

          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: Runner.app not found"
            exit 1
          fi

          APP_SIZE=$(du -sk "$APP_PATH" | cut -f1)
          echo "Runner.app: $APP_PATH (${APP_SIZE}KB)"
          echo "app-path=$APP_PATH" >> "$GITHUB_OUTPUT"

          if [ "$APP_SIZE" -lt 1000 ]; then
            echo "ERROR: Runner.app too small (${APP_SIZE}KB)"
            exit 1
          fi
          echo "OK: Runner.app looks valid (${APP_SIZE}KB)"

      - name: Build and embed signed Packet Tunnel extension
        run: |
          APP_PATH="${{ steps.build-app.outputs.app-path }}"

          rm -rf build/ios-extension
          xcodebuild \
            -project ios/Runner.xcodeproj \
            -target ForgeVpnPacketTunnel \
            -configuration Release \
            -sdk iphoneos \
            CONFIGURATION_BUILD_DIR="${{ github.workspace }}/build/ios-extension/Release-iphoneos" \
            DEVELOPMENT_TEAM="${{ secrets.IOS_DEVELOPMENT_TEAM }}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$APPLE_SIGNING_IDENTITY" \
            PROVISIONING_PROFILE="$TUNNEL_PROFILE_UUID" \
            build

          EXT_BUILT="${{ github.workspace }}/build/ios-extension/Release-iphoneos/ForgeVpnPacketTunnel.appex"
          if [ -z "$EXT_BUILT" ] || [ ! -d "$EXT_BUILT" ]; then
            echo "ERROR: built ForgeVpnPacketTunnel.appex not found"
            find build/ios-extension -name "*.appex" -print 2>/dev/null || true
            exit 1
          fi

          mkdir -p "$APP_PATH/PlugIns"
          rm -rf "$APP_PATH/PlugIns/ForgeVpnPacketTunnel.appex"
          cp -R "$EXT_BUILT" "$APP_PATH/PlugIns/"

          if [ ! -f "$APP_PATH/PlugIns/ForgeVpnPacketTunnel.appex/ForgeVpnPacketTunnel" ]; then
            echo "ERROR: embedded extension executable missing after copy"
            find "$APP_PATH/PlugIns/ForgeVpnPacketTunnel.appex" -maxdepth 2 -type f -print 2>/dev/null || true
            exit 1
          fi

          EXT_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$APP_PATH/PlugIns/ForgeVpnPacketTunnel.appex/Info.plist" 2>/dev/null || true)
          EXT_SHORT_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$APP_PATH/PlugIns/ForgeVpnPacketTunnel.appex/Info.plist" 2>/dev/null || true)
          if [ -z "$EXT_VERSION" ] || [ -z "$EXT_SHORT_VERSION" ]; then
            echo "ERROR: extension bundle version fields are missing"
            plutil -p "$APP_PATH/PlugIns/ForgeVpnPacketTunnel.appex/Info.plist" || true
            exit 1
          fi
          echo "Extension version: ${EXT_SHORT_VERSION} (${EXT_VERSION})"

          echo "OK: embedded built Packet Tunnel extension"

      - name: Sign the main app for Ad Hoc installation
        run: |
          set -euo pipefail
          APP_PATH="${{ steps.build-app.outputs.app-path }}"
          EXT_PATH="$APP_PATH/PlugIns/ForgeVpnPacketTunnel.appex"

          cp "$APP_PROFILE_PATH" "$APP_PATH/embedded.mobileprovision"

          while IFS= read -r -d '' framework; do
            codesign --force --sign "$APPLE_SIGNING_IDENTITY" --timestamp=none "$framework"
          done < <(find "$APP_PATH/Frameworks" -type d -name '*.framework' -print0 2>/dev/null)

          while IFS= read -r -d '' dylib; do
            codesign --force --sign "$APPLE_SIGNING_IDENTITY" --timestamp=none "$dylib"
          done < <(find "$APP_PATH" -type f -name '*.dylib' -print0)

          codesign --verify --deep --strict --verbose=2 "$EXT_PATH"
          codesign --force --sign "$APPLE_SIGNING_IDENTITY" --timestamp=none \
            --entitlements "$APP_ENTITLEMENTS_PATH" "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Inspect and package real VPN IPA
        run: |
          APP_PATH="${{ steps.build-app.outputs.app-path }}"
          INSPECTION_FILE="ios-build-inspection.txt"
          IPA_FILE="forge-vpn-ios-real-vpn.ipa"

          rm -rf Payload "$IPA_FILE" "$INSPECTION_FILE"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/

          EXT_PATH="Payload/Runner.app/PlugIns/ForgeVpnPacketTunnel.appex"
          EXT_EXECUTABLE="ForgeVpnPacketTunnel"
          EXT_EXECUTABLE_PATH="$EXT_PATH/$EXT_EXECUTABLE"

          {
            echo "=== Forge VPN iOS build inspection ==="
            echo "App path: $APP_PATH"
            echo "Payload path: Payload/Runner.app"
            echo ""

            echo "=== Payload bundle list ==="
            find Payload/Runner.app -maxdepth 4 \( -name "*.appex" -o -name "*.framework" -o -name "*.dylib" \) 2>/dev/null | sort
            echo ""

            echo "=== Main app Info.plist ==="
            echo "CFBundleIdentifier:"
            /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "Payload/Runner.app/Info.plist"
            echo "CFBundleExecutable:"
            /usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "Payload/Runner.app/Info.plist"
            echo "NEProviderClasses:"
            /usr/libexec/PlistBuddy -c "Print :NEProviderClasses" "Payload/Runner.app/Info.plist" 2>/dev/null || echo "(none)"
            echo ""

            echo "=== Main app Mach-O architecture ==="
            file "Payload/Runner.app/Runner"
            lipo -info "Payload/Runner.app/Runner" 2>/dev/null || true
            echo ""

            echo "=== Embedded frameworks ==="
            find Payload/Runner.app/Frameworks -maxdepth 2 -type f 2>/dev/null | sort || echo "(no Frameworks directory)"
            echo ""

            echo "=== Extension exists ==="
            test -d "$EXT_PATH"
            echo "Found: $EXT_PATH"
            echo ""

            echo "=== Extension Info.plist ==="
            echo "CFBundleIdentifier:"
            /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$EXT_PATH/Info.plist"
            echo "CFBundleExecutable:"
            /usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$EXT_PATH/Info.plist"
            echo "NSExtensionPointIdentifier:"
            /usr/libexec/PlistBuddy -c "Print :NSExtension:NSExtensionPointIdentifier" "$EXT_PATH/Info.plist"
            echo "NSExtensionPrincipalClass:"
            /usr/libexec/PlistBuddy -c "Print :NSExtension:NSExtensionPrincipalClass" "$EXT_PATH/Info.plist"
            echo ""

            echo "=== Extension executable ==="
            test -f "$EXT_EXECUTABLE_PATH"
            ls -la "$EXT_EXECUTABLE_PATH"
            file "$EXT_EXECUTABLE_PATH"
            lipo -info "$EXT_EXECUTABLE_PATH" 2>/dev/null || true
            echo ""

            echo "=== Extension bundle files ==="
            find "$EXT_PATH" -maxdepth 3 -type f | sort
            echo ""

            echo "=== Entitlements requested by project ==="
            echo "Runner.entitlements:"
            cat ios/Runner/Runner.entitlements
            echo ""
            echo "ForgeVpnPacketTunnel.entitlements:"
            cat ios/ForgeVpnPacketTunnel/ForgeVpnPacketTunnel.entitlements
            echo ""

            echo "=== codesign inspection ==="
            codesign -d --entitlements :- "Payload/Runner.app" 2>&1
            codesign -d --entitlements :- "$EXT_PATH" 2>&1
          } | tee "$INSPECTION_FILE"

          if [ ! -d "$EXT_PATH" ]; then
            echo "ERROR: ForgeVpnPacketTunnel.appex not found in Payload"
            ls -la Payload/Runner.app/PlugIns/ 2>/dev/null || true
            exit 1
          fi

          if [ ! -f "$EXT_EXECUTABLE_PATH" ]; then
            echo "ERROR: extension executable missing: $EXT_EXECUTABLE_PATH"
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "Payload/Runner.app"

          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$EXT_PATH/Info.plist" >/dev/null
          /usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$EXT_PATH/Info.plist" >/dev/null
          /usr/libexec/PlistBuddy -c "Print :NSExtension:NSExtensionPointIdentifier" "$EXT_PATH/Info.plist" >/dev/null
          /usr/libexec/PlistBuddy -c "Print :NSExtension:NSExtensionPrincipalClass" "$EXT_PATH/Info.plist" >/dev/null

          ditto -c -k --sequesterRsrc --keepParent Payload "$IPA_FILE"

          IPA_SIZE=$(du -sk "$IPA_FILE" | cut -f1)
          echo "IPA file: $IPA_FILE (${IPA_SIZE}KB)"

          if [ "$IPA_SIZE" -lt 3000 ]; then
            echo "ERROR: IPA too small (${IPA_SIZE}KB < 3000KB)"
            exit 1
          fi

          echo "OK: real VPN IPA created"
          rm -rf Payload

      - name: Upload real VPN IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: forge-vpn-ios-real-vpn.ipa
          path: forge-vpn-ios-real-vpn.ipa
          retention-days: 7

      - name: Upload iOS build inspection
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-inspection.txt
          path: ios-build-inspection.txt
          retention-days: 7
