name: Build iOS (sideload)

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  workflow_dispatch:

env:
  SING_BOX_VERSION: v1.10.0
  SING_BOX_REPO: sagernet/sing-box
  GO_VERSION: '1.23'

jobs:
  build-singbox-framework:
    runs-on: macos-latest
    outputs:
      framework-path: ${{ steps.build-framework.outputs.framework-path }}

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
          gomobile init

      - name: Checkout sing-box source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SING_BOX_REPO }}
          ref: ${{ env.SING_BOX_VERSION }}
          path: sing-box-source

      - name: Patch gomobile bindings into sing-box
        run: |
          mkdir -p sing-box-source/golib/ios
          cp golib/ios/*.go golib/ios/go.mod sing-box-source/golib/ios/
          cd sing-box-source/golib/ios
          echo "replace github.com/sagernet/sing-box => ../.." >> go.mod

      - name: Build sing-box iOS framework
        id: build-framework
        run: |
          cd sing-box-source/golib/ios
          go get golang.org/x/mobile@latest
          go mod tidy
          gomobile bind -v \
            -target=ios \
            -iosversion=14.0 \
            -ldflags='-s -w' \
            -o ${{ github.workspace }}/ios/Runner/Singbox.xcframework \
            .

      - name: Upload framework artifact
        uses: actions/upload-artifact@v4
        with:
          name: Singbox.xcframework
          path: ios/Runner/Singbox.xcframework
          retention-days: 1

  build-ios:
    needs: build-singbox-framework
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download sing-box framework
        uses: actions/download-artifact@v4
        with:
          name: Singbox.xcframework
          path: ios/Runner/Singbox.xcframework

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Precache iOS
        run: flutter precache --ios

      - name: Pod install
        run: |
          cd ios
          pod install
        continue-on-error: true

      - name: Disable code signing for CI
        run: python3 scripts/disable-codesign.py

      - name: Build iOS .app for sideload
        run: |
          # Flutter will fail at its own signing validation step,
          # but xcodebuild has already compiled the .app
          flutter build ios --release --no-codesign || true

      - name: Create .ipa for sideloading
        run: |
          APP_PATH="build/ios/iphoneos/Runner.app"
          if [ -d "$APP_PATH" ]; then
            echo "✅ App found at $APP_PATH"
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r forge-vpn-ios.ipa Payload/
            rm -rf Payload
          else
            # Try deriving data alternative path
            ALT_PATH="build/ios/Build/Products/Release-iphoneos/Runner.app"
            if [ -d "$ALT_PATH" ]; then
              echo "✅ App found at $ALT_PATH"
              mkdir -p Payload
              cp -r "$ALT_PATH" Payload/
              zip -r forge-vpn-ios.ipa Payload/
              rm -rf Payload
            else
              echo "⚠️ App not found, searching..."
              find build -name "Runner.app" -type d 2>/dev/null
              exit 1
            fi
          fi

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: forge-vpn-ios.ipa
          path: forge-vpn-ios.ipa
          retention-days: 7
