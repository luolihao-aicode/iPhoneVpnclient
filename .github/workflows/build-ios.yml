name: Build iOS (sideload)

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Precache iOS
        run: flutter precache --ios

      - name: Pod install
        run: |
          cd ios
          pod install
        continue-on-error: true  # Some pod errors are OK for debug builds

      - name: Build iOS (no codesign)
        run: flutter build ios --debug --no-codesign

      - name: Create .ipa for sideloading
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r forge-vpn-ios.ipa Payload/
          rm -rf Payload

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: forge-vpn-ios.ipa
          path: forge-vpn-ios.ipa
