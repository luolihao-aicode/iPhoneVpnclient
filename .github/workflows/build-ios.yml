name: Build iOS (sideload)

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  workflow_dispatch:

env:
  SING_BOX_VERSION: v1.10.0
  SING_BOX_REPO: sagernet/sing-box
  GO_VERSION: '1.23'
  MIN_IPA_SIZE_KB: 3000

jobs:
  build-singbox-framework:
    runs-on: macos-latest
    outputs:
      framework-path: ${{ steps.build-framework.outputs.framework-path }}

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
          gomobile init

      - name: Checkout sing-box source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SING_BOX_REPO }}
          ref: ${{ env.SING_BOX_VERSION }}
          path: sing-box-source

      - name: Patch gomobile bindings into sing-box
        run: |
          mkdir -p sing-box-source/golib/ios
          cp golib/ios/*.go golib/ios/go.mod sing-box-source/golib/ios/
          cd sing-box-source/golib/ios
          echo "replace github.com/sagernet/sing-box => ../.." >> go.mod

      - name: Build sing-box iOS framework
        id: build-framework
        run: |
          cd sing-box-source/golib/ios
          go get golang.org/x/mobile@latest
          go mod tidy
          gomobile bind -v \
            -target=ios \
            -iosversion=14.0 \
            -ldflags='-s -w' \
            -o ${{ github.workspace }}/ios/Runner/Singbox.xcframework \
            .
          echo "framework-path=${{ github.workspace }}/ios/Runner/Singbox.xcframework" >> "$GITHUB_OUTPUT"

      - name: Upload framework artifact
        uses: actions/upload-artifact@v4
        with:
          name: Singbox.xcframework
          path: ios/Runner/Singbox.xcframework
          retention-days: 1

  build-ios:
    needs: build-singbox-framework
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download sing-box framework
        uses: actions/download-artifact@v4
        with:
          name: Singbox.xcframework
          path: ios/Runner/Singbox.xcframework

      - name: Verify framework downloaded
        run: |
          FRAMEWORK_SIZE=$(du -sk ios/Runner/Singbox.xcframework 2>/dev/null | cut -f1)
          echo "Singbox.xcframework size: ${FRAMEWORK_SIZE}KB"
          if [ -z "$FRAMEWORK_SIZE" ] || [ "$FRAMEWORK_SIZE" -lt 5000 ]; then
            echo "❌ Singbox.xcframework is missing or too small"
            exit 1
          fi
          echo "✅ Singbox.xcframework looks valid"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Precache iOS
        run: flutter precache --ios

      - name: Pod install
        run: |
          cd ios
          pod install

      # Step 1: Generate Xcode project files via flutter build (will fail on code signing,
      # but project files + Pods are generated)
      - name: Generate Xcode project files
        id: gen-xcode
        continue-on-error: true
        run: |
          flutter build ios --release --no-codesign 2>&1
          # Save the exit code but continue regardless
          echo "status=$?" >> "$GITHUB_OUTPUT"

      # Step 2: Patch Xcode project to disable code signing completely
      - name: Disable code signing
        run: python3 scripts/disable-codesign.py

      # Step 3: Compile with xcodebuild directly, bypassing Flutter's post-build check
      - name: Build .app with xcodebuild (unsigned)
        id: build-app
        run: |
          cd ios

          # Ensure Flutter's build script phase can find xcode_backend.sh
          export FLUTTER_ROOT=$(dirname $(dirname $(which flutter)))

          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ../build/ios \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            -allowProvisioningUpdates \
            2>&1 | tee xcodebuild.log

          # Check xcodebuild result
          XCODE_EXIT=${PIPESTATUS[0]}
          if [ $XCODE_EXIT -ne 0 ]; then
            echo "⚠️ xcodebuild exited with code $XCODE_EXIT"
            echo "Checking if .app was produced anyway..."

            # Search for Runner.app in derived data
            APP_PATH=$(find ../build/ios -name "Runner.app" -type d 2>/dev/null | head -1)

            if [ -z "$APP_PATH" ]; then
              echo "❌ No Runner.app found"
              exit 1
            fi
          else
            APP_PATH="../build/ios/Build/Products/Release-iphoneos/Runner.app"
          fi

          APP_SIZE=$(du -sk "$APP_PATH" | cut -f1)
          echo "Runner.app: $APP_PATH (${APP_SIZE}KB)"
          echo "app-path=$APP_PATH" >> "$GITHUB_OUTPUT"

          if [ "$APP_SIZE" -lt 1000 ]; then
            echo "❌ Runner.app is too small (${APP_SIZE}KB), build likely failed"
            exit 1
          fi
          echo "✅ Runner.app looks valid"

      - name: Create .ipa for sideloading
        run: |
          APP_PATH="${{ steps.build-app.outputs.app-path }}"
          echo "Packaging: $APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r forge-vpn-ios.ipa Payload/
          rm -rf Payload

          IPA_SIZE=$(du -sk forge-vpn-ios.ipa | cut -f1)
          echo "forge-vpn-ios.ipa size: ${IPA_SIZE}KB"

          if [ "$IPA_SIZE" -lt "$MIN_IPA_SIZE_KB" ]; then
            echo "❌ IPA too small (${IPA_SIZE}KB < ${MIN_IPA_SIZE_KB}KB), build likely failed"
            exit 1
          fi
          echo "✅ forge-vpn-ios.ipa created (${IPA_SIZE}KB)"

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: forge-vpn-ios.ipa
          path: forge-vpn-ios.ipa
          retention-days: 7
